name: Ryanair Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC (08:00 hora española)
    - cron: '0 14 * * *'  # 14:00 UTC (16:00 hora española)
  workflow_dispatch:        # permite lanzarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Run scraper
        working-directory: scraper
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scrape.js
